name: Daily Trending Update

on:
  # 每天 UTC 23:00 (= 台灣時間 07:00) 跑
  schedule:
    - cron: "0 23 * * *"
  # 允許手動觸發 (Actions 頁面 → Run workflow)
  workflow_dispatch:
    inputs:
      since:
        description: "抓取類型 (留空 = 全部)"
        required: false
        default: "all"
        type: choice
        options: [all, daily, weekly, monthly]
      skip_llm:
        description: "跳過 LLM 摘要 (只抓 + 存原文)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # commit 仍會保留 docs/ 進版控 (備份 + 歷史)
  pages: write      # 部署到 GitHub Pages
  id-token: write   # OIDC 驗證
  actions: read     # 讀 workflow_run

concurrency:
  group: opentop-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config
        run: |
          if [ ! -f config.yml ]; then
            cp config.example.yml config.yml
          fi

      - name: Run opentop
          # 從 repo Settings → Secrets and variables → Actions → New repository secret
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.skip_llm }}" = "true" ]; then
            SINCE_FLAG="--no-llm"
          elif [ "${{ github.event.inputs.since }}" != "all" ] && [ -n "${{ github.event.inputs.since }}" ]; then
            SINCE_FLAG="--since ${{ github.event.inputs.since }}"
          else
            SINCE_FLAG=""
          fi
          echo "Running: python scripts/run.py $SINCE_FLAG"
          python scripts/run.py $SINCE_FLAG

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit & Push (備份 SQLite + 此次 docs 到版控)
        run: |
          git config user.name "opentop-bot"
          git config user.email "opentop-bot@users.noreply.github.com"
          # data/*.db 與 logs/*.log 都被 .gitignore 排除, 這裡只 commit docs/
          git add docs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no docs changes to commit"
          else
            git commit -m "chore: daily trending update $(date -u +%Y-%m-%d)"
            git push
          fi
